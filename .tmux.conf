new-session -d
split-window -h
split-window -v
select-pane -t 0

# Unbind default prefix
unbind C-b

# Set new prefix
set-option -g prefix C-a

# Make Ctrl-a send prefix
bind C-a send-prefix

# Reduce delay for prefix combos
set -s escape-time 0

# Optional but recommended: use Ctrl-a + | and -
bind | split-window -h
bind - split-window -v

# Use system clipboard for copy
set-option -g set-clipboard on

set -g mouse on
